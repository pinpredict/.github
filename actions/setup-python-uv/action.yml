name: Setup Python (uv)
description: |
  Install uv + a pinned Python version + optionally `uv sync`. Standard
  Python-setup recipe for pinpredict Python repos (dis, replay, magellan,
  trader-tools BFF).

  uv handles both Python distribution caching (its own ~/.local/share/uv
  directory) and dependency caching (the lockfile-based uv sync). Bumping
  the uv version itself is a one-line change here that propagates to every
  caller on next push.

inputs:
  python-version:
    description: "Python version (matches .python-version when present)."
    required: false
    default: "3.13"
  uv-sync:
    description: "When true (default), run `uv sync` after installing Python."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: uv sync
      if: inputs.uv-sync == 'true'
      shell: bash
      run: uv sync
