name: Stevedore Release

# Reusable image build/release via stevedore (https://github.com/blairham/stevedore).
#
# Unlike docker-release.yml, the CALLER PASSES NO SERVICE MATRIX. stevedore reads
# the repo's .stevedore.yaml, resolves per-service ECR versions itself
# (`aws ecr describe-images`, highest X.Y.Z + bump), does change detection
# (--changed-since or the config's change_detection), and builds — in parallel —
# only the images whose sources changed.
#
# Draft for evaluation. stevedore v0.0.3 closes the marker-ref gap: with
# `change_detection.marker_refs: true` in a repo's .stevedore.yaml it advances
# and pushes `refs/releases/image/<id>` after each successful publish (the same
# ref family docker-release.yml uses — image ids match service names). It also
# groups identical build specs and builds them once (build-once-tag-many).
# Remaining gap vs docker-release.yml: no Dispatch publish notification yet.
# Use --no-push (default) until that is wired, or keep docker-release.yml for
# real publishes.

on:
  workflow_call:
    inputs:
      command:
        description: "stevedore subcommand (release, build, check)."
        required: false
        type: string
        default: "release"
      changed-since:
        description: "git ref to diff against for change detection (e.g. the PR base or the pushed-before SHA)."
        required: false
        type: string
        default: ""
      no-push:
        description: "Build without pushing (validation only). Default true while this is a draft."
        required: false
        type: boolean
        default: true
      parallel:
        description: "Build up to N images concurrently."
        required: false
        type: number
        default: 4
      stevedore-version:
        description: "stevedore release to use."
        required: false
        type: string
        default: "v0.0.3"

env:
  AWS_REGION: us-east-1

concurrency:
  group: stevedore-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stevedore:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push refs/releases/image/* marker refs on publish
      id-token: write # AWS OIDC (ECR) + cosign keyless signing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags + history for versioning and change detection

      - name: Configure AWS
        uses: pinpredict/.github/actions/configure-aws-with-retry@main
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compose args
        id: args
        env:
          NO_PUSH: ${{ inputs.no-push }}
          PARALLEL: ${{ inputs.parallel }}
          CHANGED_SINCE: ${{ inputs.changed-since }}
        run: |
          set -euo pipefail
          args="--parallel ${PARALLEL}"
          [ "${NO_PUSH}" = "true" ] && args="${args} --no-push"
          [ -n "${CHANGED_SINCE}" ] && args="${args} --changed-since ${CHANGED_SINCE}"
          echo "value=${args}" >> "$GITHUB_OUTPUT"

      - name: Stevedore
        # uses: refs cannot be expressions — pin the action; the `version`
        # input below selects the binary that actually runs.
        uses: blairham/stevedore@v0.0.3
        env:
          # ECR host, e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com — the
          # .stevedore.yaml repositories template this as {{ .Env.REGISTRY }}.
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        with:
          command: ${{ inputs.command }}
          version: ${{ inputs.stevedore-version }}
          args: ${{ steps.args.outputs.value }}
          # cosign/syft/grype install is skipped — enable per config once
          # sign/sbom/scan are turned on in .stevedore.yaml.
          install-cosign: "false"
          install-syft: "false"
          install-grype: "false"

