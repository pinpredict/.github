# jobs:
#   images:
#     permissions: { contents: write, id-token: write }
#     uses: pinpredict/.github/.github/workflows/docker-release.yml@main
#     with:
#       changed-since: ${{ github.event.before }}   # or the PR base SHA
#     secrets: inherit
