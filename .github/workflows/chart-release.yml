name: Helm Chart Release

# Reusable matrix-based Helm chart release.
#
# Auto-discovers charts under `charts/*/`. For each chart:
#   - Skips charts unchanged since their last release (baseline =
#     refs/releases/chart/<name> marker ref, legacy chart/<name>/X.Y.Z
#     tag as fallback) unless workflow_dispatch forced a release.
#   - Resolves the next version from the ECR OCI repo (highest X.Y.Z
#     tag + 1 — the artifact store is the version record,
#     platform-gitops#1201), packages, pushes, advances the marker ref,
#     mints the legacy git tag, contributes to one aggregated GitHub
#     Release.
#
# Caller has no inputs; auto-discovery handles everything. Each repo's
# `ci.yml` decides whether to call this workflow.

on:
  workflow_call:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 784682930591.dkr.ecr.us-east-1.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: chart-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Discover charts needing release
        id: set
        run: |
          set -euo pipefail
          force=${{ github.event_name == 'workflow_dispatch' }}
          entries=()

          # Per-service IAM push role. All trading services are
          # self-service-deploy-migrated; each chart's push role follows
          # the deterministic naming `xp-<name>-gha-push` rendered by
          # the per-service Service XR composition (platform-gitops#524
          # / #526). A chart whose `name:` doesn't exist as a service
          # under `.platform/services/` would have no such role minted —
          # `role=""` falls back to ${{ secrets.AWS_ROLE_ARN }} in the
          # package job below.
          DEV_ACCOUNT_ID=784682930591
          per_service_role() {
            if [ -f ".platform/services/$1.yaml" ]; then
              echo "arn:aws:iam::${DEV_ACCOUNT_ID}:role/xp-$1-gha-push"
            else
              echo ""
            fi
          }

          # Change-detection baselines live in per-chart marker refs
          # (refs/releases/chart/<name>, advanced by the package job on
          # each successful push — platform-gitops#1201). Not tags, so
          # checkout's fetch-tags does not bring them in. Version
          # resolution happens in the package job: ECR is the version
          # record and this job has no AWS credentials.
          git fetch --quiet origin '+refs/releases/*:refs/releases/*' || true

          for chart_dir in charts/*/; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            name=$(grep '^name:' "${chart_dir}Chart.yaml" | awk '{print $2}')

            base=""
            if git rev-parse -q --verify "refs/releases/chart/${name}" >/dev/null; then
              base="refs/releases/chart/${name}"
            else
              # Legacy fallback until the chart has released once with
              # the marker ref in place.
              base=$(git tag --list "chart/${name}/*" --sort=-v:refname \
                | grep -E "^chart/${name}/[0-9]+\.[0-9]+\.[0-9]+$" | head -n1 || true)
            fi

            # Skip unchanged charts unless dispatch forced a release
            if [ "$force" != "true" ] && [ -n "$base" ]; then
              changed=$(git diff --name-only "${base}..HEAD" -- "${chart_dir}" || true)
              if [ -z "$changed" ]; then
                echo "${name}: no changes since ${base} — skipping"
                continue
              fi
            fi

            echo "${name}: will release"
            dir="${chart_dir%/}"
            role=$(per_service_role "$name")
            entries+=("{\"name\":\"${name}\",\"dir\":\"${dir}\",\"role\":\"${role}\"}")
          done

          if [ ${#entries[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No charts to release."
            exit 0
          fi

          json="{\"include\":[$(IFS=,; echo "${entries[*]}")]}"
          echo "matrix=${json}" >> "$GITHUB_OUTPUT"
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${json}"

  package:
    needs: prepare
    if: needs.prepare.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Three-shot retry on the AWS AssumeRole to survive a
      # first-colocation race with Crossplane minting the per-service
      # xp-<svc>-gha-push role (pinpredict/trading#616). Empty
      # `matrix.role` for un-migrated charts falls back to the central
      # xp-trading-gha-push role in secrets.AWS_ROLE_ARN. See the action
      # for the full incident writeup.
      - name: Configure AWS credentials
        uses: pinpredict/.github/actions/configure-aws-with-retry@main
        with:
          role-to-assume: ${{ matrix.role || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Resolve version, package, push, tag
        id: release
        env:
          NAME: ${{ matrix.name }}
          DIR: ${{ matrix.dir }}
        run: |
          set -euo pipefail

          # The ECR OCI repo is the version record: next version is a
          # patch bump of the highest X.Y.Z tag already pushed. Git tags
          # are a legacy mirror, still minted below for deploy
          # correlation but no longer read (platform-gitops#1201). A
          # missing repo or an empty tag list both mean first release.
          latest=$(aws ecr describe-images \
            --repository-name "charts/${NAME}" \
            --filter tagStatus=TAGGED \
            --query 'imageDetails[].imageTags[]' --output text 2>/dev/null \
            | tr '[:space:]' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n1 || true)

          if [ -z "$latest" ]; then
            major=0; minor=0; patch=0
          else
            IFS='.' read -r major minor patch <<< "$latest"
          fi
          patch=$((patch + 1))

          # ECR chart versions are immutable — probe-and-bump past any
          # candidate that already exists (covers races that slip the
          # workflow concurrency group and repos with gaps above the
          # max semver).
          while helm show chart "oci://${ECR_REGISTRY}/charts/${NAME}" \
              --version "${major}.${minor}.${patch}" >/dev/null 2>&1; do
            echo "Chart ${NAME}:${major}.${minor}.${patch} exists in ECR — bumping"
            patch=$((patch + 1))
          done
          version="${major}.${minor}.${patch}"
          tag="chart/${NAME}/${version}"

          # Stamp the resolved version into Chart.yaml before packaging
          sed -i "s/^version:.*/version: ${version}/" "${DIR}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${version}\"/" "${DIR}/Chart.yaml"

          echo "Packaging ${NAME} v${version} from ${DIR}"
          helm package "${DIR}"
          helm push "${NAME}-${version}.tgz" "oci://${ECR_REGISTRY}/charts"

          # Alias the pushed chart with a sha-suffixed tag. Dispatch's
          # ECR-push backstop recovers commit provenance only from an
          # X.Y.Z-<sha7> tag (platform-gitops#1201); a plain-version
          # event carries no commit and is ignored. Repo immutability
          # blocks re-pushing existing tags but allows aliasing the
          # same manifest under a new one. Warn-only: without the
          # alias the direct CI notification below still covers the
          # release.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          manifest=$(aws ecr batch-get-image --repository-name "charts/${NAME}" \
            --image-ids imageTag="${version}" \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --repository-name "charts/${NAME}" \
            --image-tag "${version}-${SHORT_SHA}" \
            --image-manifest "$manifest" >/dev/null \
            || echo "::warning::sha alias tag failed for charts/${NAME}:${version}-${SHORT_SHA}"

          # Tag immediately after successful push (retry up to 3 times).
          # If permanent failure the chart sits in ECR with no git tag —
          # the next run's recovery loop will reclaim it.
          git tag "$tag"
          tag_pushed=false
          for attempt in 1 2 3; do
            if git push origin "$tag"; then
              tag_pushed=true
              break
            fi
            echo "::warning::Git tag push attempt ${attempt}/3 failed for ${tag}"
            sleep 2
          done

          if [ "$tag_pushed" != true ]; then
            echo "::error::Git tag push failed after 3 attempts for ${tag} — chart already in ECR!"
            exit 1
          fi

          # Advance the per-chart release marker — one mutable ref, not
          # a tag, so it is invisible to Kargo's tag enumeration and the
          # GitHub create-webhook. The prepare job diffs against it to
          # decide whether the chart needs a release.
          git push --force origin "${GITHUB_SHA}:refs/releases/chart/${NAME}" \
            || echo "::warning::Marker ref push failed for refs/releases/chart/${NAME} — next run falls back to the legacy tag baseline"

          mkdir -p release-info
          echo "${NAME} ${version}" > "release-info/${NAME}.txt"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Direct publish signal to Dispatch (platform-gitops#1201) — the
      # replacement for the create-webhook on the legacy git tag. Never
      # fails the release; the EventBridge ECR-push backstop covers a
      # missed notification.
      - name: Notify Dispatch
        if: steps.release.outcome == 'success'
        uses: pinpredict/.github/actions/notify-dispatch@main
        with:
          kind: chart
          service: ${{ matrix.name }}
          version: ${{ steps.release.outputs.version }}
          secret: ${{ secrets.CI_WEBHOOK_SECRET }}

      - name: Upload release info
        if: steps.release.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: chart-release-info-${{ matrix.name }}
          path: release-info/${{ matrix.name }}.txt
          retention-days: 1

  release-summary:
    needs: package
    if: ${{ !cancelled() && needs.package.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download chart-release-info artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-info
          pattern: chart-release-info-*
          merge-multiple: true

      - name: Create aggregated GitHub release
        run: |
          set -euo pipefail
          shopt -s nullglob
          released=()
          for f in release-info/*.txt; do
            released+=("$(cat "$f")")
          done

          if [ ${#released[@]} -eq 0 ]; then
            echo "No charts were released."
            exit 0
          fi

          title="Charts: $(IFS=', '; echo "${released[*]}")"
          first_name="${released[0]%% *}"
          first_ver="${released[0]##* }"
          gh release create "chart/${first_name}/${first_ver}" \
            --generate-notes \
            --title "$title"

      - name: Fail if any package failed
        if: needs.package.result != 'success'
        run: |
          echo "::error::One or more chart packages failed (package job result: ${{ needs.package.result }})"
          exit 1
