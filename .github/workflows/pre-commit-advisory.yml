name: Pre-commit (advisory)

# Non-blocking pre-commit run that surfaces what the repo's local
# pre-commit hooks would flag on this PR's diff. On failure it posts (or
# updates) a sticky PR comment with the output; on a clean diff it stays
# silent (and clears any prior failure comment back to ✅). Either way it
# fails the job on hook failure so engineers see a ❌ check — but this
# workflow is NOT required for merge in any repo's branch protection, so
# it never blocks.
#
# Why silent-on-success: the bot's only email is the *creation* of a PR
# comment (GitHub doesn't email on edits). Posting a ✅ comment on every
# clean PR emailed every author for a no-op. Commenting only on failure
# keeps clean PRs email-free while still surfacing real violations.
#
# Why advisory and not required: org-wide pre-commit configs accumulate
# over time, and existing repos carry pre-existing violations. Forcing
# every PR to fix the org-wide debt before merge would block real work.
# We scope to PR-diff (--from-ref/--to-ref) so engineers only see
# violations they introduced or touched, and let social pressure build
# the habit without a hard gate.
#
# If a repo wants to harden this into a merge-blocking check, add this
# workflow's job name to the repo's branch protection required checks
# in the GitHub UI — no caller-side YAML change needed.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version used to run pre-commit. The hooks themselves use their own languages (see setup-dotnet, setup-node-pnpm)."
        type: string
        default: "3.13"
      setup-dotnet:
        description: |
          When true, install .NET SDK + `dotnet tool restore` before running
          pre-commit. Required when the repo has hooks that invoke `dotnet`
          tools (e.g. csharpier). .NET SDK itself is cached by setup-dotnet
          across runs; tool restore reads `.config/dotnet-tools.json`.
        type: boolean
        default: false
      dotnet-version:
        description: ".NET SDK version. Ignored when setup-dotnet=false."
        type: string
        default: "10.0.x"
      setup-node-pnpm:
        description: |
          When true, enable corepack + install Node + `pnpm install --frozen-lockfile`
          before running pre-commit. Required when the repo has hooks that
          invoke pnpm/node binaries (e.g. ui-eslint, ui-prettier). Node and
          pnpm store are cached by setup-node + setup-uv across runs.
        type: boolean
        default: false
      node-version:
        description: "Node version. Ignored when setup-node-pnpm=false."
        type: string
        default: "24"

permissions:
  contents: read
  pull-requests: write

jobs:
  advisory:
    runs-on: ubuntu-latest
    # Only meaningful on PRs — on push, the diff base is ambiguous and
    # the value (already-merged code) is lower. Callers can still invoke
    # this on push if they want; the job will skip cleanly.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pre-commit hook envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-

      - name: Install pre-commit
        run: pip install --upgrade pip pre-commit

      # Optional: install .NET SDK + restore local tools (csharpier, etc).
      # setup-dotnet@v5 caches the SDK by version across runs.
      - name: Set up .NET
        if: inputs.setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      # Cache the dotnet tool install directory keyed on the tools manifest.
      # ~/.dotnet/tools is tiny but the install (`dotnet tool restore`)
      # downloads csharpier + any other tools; cache makes it a no-op on
      # warm runs.
      - name: Cache dotnet tools
        if: inputs.setup-dotnet
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: dotnet-tools-${{ runner.os }}-${{ hashFiles('**/dotnet-tools.json') }}
          restore-keys: |
            dotnet-tools-${{ runner.os }}-

      - name: Restore .NET tools
        if: inputs.setup-dotnet
        run: dotnet tool restore

      # Optional: install Node + enable pnpm + install workspace deps.
      # setup-node@v4 with cache:pnpm caches the pnpm content-addressable
      # store across runs, so `pnpm install --frozen-lockfile` is mostly
      # a symlink-create after the first run (5-10s typical).
      - name: Enable corepack (pnpm)
        if: inputs.setup-node-pnpm
        run: corepack enable

      - name: Set up Node.js
        if: inputs.setup-node-pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node workspace deps
        if: inputs.setup-node-pnpm
        run: pnpm install --frozen-lockfile

      - name: Run pre-commit on PR diff
        id: precommit
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          # --from-ref/--to-ref restricts the run to files changed in
          # this PR's diff, so engineers don't get blasted with org-wide
          # pre-existing violations on unrelated lines.
          pre-commit run \
            --from-ref "$BASE_SHA" \
            --to-ref "$HEAD_SHA" \
            --show-diff-on-failure \
            --color never \
            2>&1 | tee /tmp/precommit.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Build PR comment body
        id: body
        env:
          EXIT_CODE: ${{ steps.precommit.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$EXIT_CODE" = "0" ]; then
            cat > /tmp/body.md <<EOF
          <!-- pre-commit-advisory -->
          ✅ **pre-commit (advisory)** — no issues on changed files.
          EOF
          else
            # Truncate the log to a reasonable comment size — GitHub
            # comments cap at 65k chars; keep a safe margin for the
            # surrounding boilerplate.
            log_excerpt=$(head -c 50000 /tmp/precommit.log)
            {
              echo "<!-- pre-commit-advisory -->"
              echo "⚠️ **pre-commit (advisory)** would flag the following on this PR's diff."
              echo ""
              echo "This check is **non-blocking** — it surfaces what your local pre-commit hooks would catch. To reproduce + fix locally:"
              echo ""
              echo '```bash'
              echo "pre-commit run --from-ref origin/main --to-ref HEAD"
              echo '```'
              echo ""
              echo "Full run log: $RUN_URL"
              echo ""
              echo "<details><summary>Hook output (truncated to 50KB)</summary>"
              echo ""
              echo '```'
              echo "$log_excerpt"
              echo '```'
              echo ""
              echo "</details>"
            } > /tmp/body.md
          fi
          echo "path=/tmp/body.md" >> "$GITHUB_OUTPUT"

      - name: Find existing advisory comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- pre-commit-advisory -->

      # Comment only when there's something to say or to clear:
      #   - failure (exit_code != 0): create/update the ⚠️ comment. The
      #     first create on a given PR emails its author; later updates
      #     (edits) don't, so a PR is at most one email from this bot.
      #   - success with an EXISTING comment: edit it back to ✅ so a
      #     fixed PR doesn't keep a stale ⚠️. An edit, so no email.
      #   - success with NO existing comment (the common clean-PR case):
      #     skip entirely — no comment, no email, no inbox noise.
      # Without the comment-id guard on the success branch, create-or-update
      # would *create* a ✅ comment on every clean PR and email the author.
      - name: Post or update PR comment
        if: steps.precommit.outputs.exit_code != '0' || steps.find.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.path }}
          edit-mode: replace

      - name: Reflect pre-commit exit code as the job's status
        if: steps.precommit.outputs.exit_code != '0'
        run: |
          echo "::error::pre-commit found issues on this PR's diff. See the sticky PR comment and the run log."
          exit 1
